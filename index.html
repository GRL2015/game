<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neon Drift</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="app">
    <header class="top-bar">
      <h1>Neon Drift</h1>
      <div class="stats" aria-live="polite">
        <div class="stat">
          <span class="label">Score</span>
          <span class="value" id="scoreValue">0</span>
        </div>
        <div class="stat">
          <span class="label">Best</span>
          <span class="value" id="bestValue">0</span>
        </div>
        <div class="stat">
          <span class="label">Level</span>
          <span class="value" id="levelValue">1</span>
        </div>
      </div>
    </header>

    <section class="canvas-panel">
      <canvas
        id="gameCanvas"
        width="800"
        height="500"
        role="img"
        aria-label="Neon Drift gameplay area"
      ></canvas>
      <div class="overlay" id="overlay">
        <p id="overlayTitle" class="overlay-title">Dodge the meteors.</p>
        <p id="overlayText" class="overlay-text">
          Move with A / D, arrow keys, or drag on touch. Collect glowing orbs for points.
        </p>
      </div>
    </section>

    <section class="controls">
      <button id="startButton" class="button primary" type="button">Start Game</button>
      <button id="pauseButton" class="button" type="button" disabled>Pause</button>
      <button id="restartButton" class="button" type="button" disabled>Restart</button>
    </section>

    <footer>
      <p>
        Static HTML game. Upload <code>index.html</code>, <code>style.css</code>, and
        <code>game.js</code> to game hubs like itch.io or Newgrounds.
      </p>
    </footer>
  </main>

  <script src="./game.js"></script>
</body>
</html>
